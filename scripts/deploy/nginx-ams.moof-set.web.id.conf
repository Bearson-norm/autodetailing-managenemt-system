# Site: ams.moof-set.web.id — Auto Detailing (SPA + /api → Node)
# Backend PORT must match proxy_pass (5001 if Gunicorn uses 5000).
#
# Install on VPS:
#   1. sudo cp this file to /etc/nginx/sites-available/autodetaailing
#   2. sudo ln -sf /etc/nginx/sites-available/autodetaailing /etc/nginx/sites-enabled/
#   3. sudo nginx -t && sudo systemctl reload nginx
#   4. Certificate (already issued): paths below under /etc/letsencrypt/live/ams.moof-set.web.id/
#
# If cert exists but Certbot said "Could not install certificate", this file provides the
# matching server_name blocks so Nginx uses the cert. Then: sudo certbot install --cert-name ams.moof-set.web.id
# (optional; manual ssl_certificate lines below are enough.)
#
# HTTP 500 on / — common when root is under /home/...: www-data cannot enter a 700 home dir.
# Fix: chmod o+x /home/Admin123   (and parents as needed), or use root under /var/www/...
# Debug: sudo tail -30 /var/log/nginx/error.log

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name ams.moof-set.web.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ams.moof-set.web.id;

    ssl_certificate     /etc/letsencrypt/live/ams.moof-set.web.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ams.moof-set.web.id/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    # If nginx -t complains about missing file, comment the next line:
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # MUST be: <repo clone>/dist
    root /home/Admin123/autodetailing-managenemt-system/dist;
    index index.html;

    client_max_body_size 12M;

    location /api {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
