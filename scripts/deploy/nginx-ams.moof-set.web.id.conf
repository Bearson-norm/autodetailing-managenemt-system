# Site: ams.moof-set.web.id — Auto Detailing (SPA + /api → Node)
# If Gunicorn (or anything else) already binds 127.0.0.1:5000, set backend/.env PORT=5001
# and use proxy_pass http://127.0.0.1:5001 below (must match PORT).
#
# VPS setup (run as root or sudo):
#   1. DNS: A record  ams.moof-set.web.id  →  your VPS public IP
#   2. Fix `root` below: absolute path to repo + /dist (same as VPS_DEPLOY_PATH from GitHub)
#   3. sudo cp this file to /etc/nginx/sites-available/autodetaailing
#   4. sudo ln -sf /etc/nginx/sites-available/autodetaailing /etc/nginx/sites-enabled/
#   5. sudo nginx -t && sudo systemctl reload nginx
#   6. TLS: sudo apt install certbot python3-certbot-nginx
#        sudo certbot --nginx -d ams.moof-set.web.id
#
# App checklist: repo root `.env.production` with VITE_API_URL=/api
#                backend `.env` CORS_ORIGIN=https://ams.moof-set.web.id

server {
    listen 80;
    listen [::]:80;
    server_name ams.moof-set.web.id;

    # CHANGE THIS to match your clone path (output of: git -C <repo> rev-parse --show-toplevel)
    root /home/foom/autodetaailing/dist;
    index index.html;

    client_max_body_size 12M;

    location /api {
        # Match backend/.env PORT (5001 when port 5000 is used by Gunicorn on the same host)
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
