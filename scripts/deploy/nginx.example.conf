# Example Nginx site for Auto Detailing app after CI/CD deploy.
# Production domain ams.moof-set.web.id: see nginx-ams.moof-set.web.id.conf
# Adjust server_name, SSL paths, and root to match your VPS.
#
# Assumes:
#   - Repo deployed at /var/www/autodetaailing (VPS_DEPLOY_PATH)
#   - `npm run build` output is /var/www/autodetaailing/dist
#   - API listens on 127.0.0.1:PORT from backend/.env (default 5000; use 5001 if Gunicorn uses 5000)
#   - Frontend built with VITE_API_URL=/api (same origin; see root .env.example)

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    root /var/www/autodetaailing/dist;
    index index.html;

    client_max_body_size 12M;

    location /api {
        # Must match backend/.env PORT
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# After HTTP works, use certbot or your CA for TLS and add a second server block
# listen 443 ssl; with ssl_certificate / ssl_certificate_key.
