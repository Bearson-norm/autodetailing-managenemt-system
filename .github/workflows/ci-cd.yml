# CI: frontend + backend build in parallel; separate npm caches per job.
# CD: uploads dist artifacts, deploys tarball to VPS (git sync + prod backend npm + migrate + PM2).
#
# One-time VPS preparation (database on the same machine):
#   1. Install Node 20+, git, nginx (optional but typical), PM2: npm i -g pm2
#   2. PostgreSQL: create DB and user, e.g.
#        sudo -u postgres psql -c "CREATE USER autodetaailing WITH PASSWORD 'strong-secret';"
#        sudo -u postgres psql -c "CREATE DATABASE autodetaailing OWNER autodetaailing;"
#   3. Clone this repo to VPS_DEPLOY_PATH (e.g. git clone … /var/www/autodetaailing)
#   4. Create backend/.env on the server (never commit). Use DB_HOST=127.0.0.1 or localhost,
#      production DB_* credentials, SESSION_SECRET, PORT=5000, NODE_ENV=production,
#      CORS_ORIGIN=https://your-frontend-domain (must match the browser origin).
#   5. Create root .env.production with VITE_API_URL (e.g. /api if Nginx proxies /api).
#      Vite loads it during the runner build; artifact deploy does not run vite on the VPS.
#   6. Configure Nginx (see scripts/deploy/nginx.example.conf) to serve dist/ and proxy /api.
#
# Required GitHub repository secrets:
#   VPS_HOST        — server hostname or IP
#   VPS_USER        — SSH user (e.g. deploy)
#   VPS_SSH_KEY     — private key for that user (full PEM, including BEGIN/END lines)
#   VPS_DEPLOY_PATH — absolute path to the app on the server (e.g. /var/www/autodetaailing)
# Optional:
#   VPS_PORT        — SSH port (default 22)
#   VPS_SSH_KNOWN_HOSTS — output of: ssh-keyscan -p PORT HOST (recommended to pin the host key)
#
# Repo Settings → Environments → "production": add the secrets there if you use protection rules.

name: CI / CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write # upload-artifact / download-artifact

jobs:
  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install & build
        run: |
          npm ci
          NODE_ENV=production npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          retention-days: 7

  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install & build
        run: |
          cd backend
          npm ci
          npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist
          retention-days: 7

  deploy:
    name: Deploy to VPS
    needs: [build-frontend, build-backend]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PORT: ${{ secrets.VPS_PORT }}
      VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend/dist

      - name: Pack release tarball
        run: |
          set -euo pipefail
          tar czf "${RUNNER_TEMP}/autodetaailing-release.tgz" dist backend/dist

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "${KNOWN_HOSTS:-}" ]; then
            echo "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            P="${VPS_PORT:-22}"
            ssh-keyscan -p "$P" -H "$VPS_HOST" >> ~/.ssh/known_hosts
          fi

      - name: Deploy over SSH
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          P="${VPS_PORT:-22}"
          RELEASE_REMOTE="/tmp/autodetaailing-release-${GITHUB_SHA}.tgz"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            -P "$P" \
            "${RUNNER_TEMP}/autodetaailing-release.tgz" \
            "${VPS_USER}@${VPS_HOST}:${RELEASE_REMOTE}"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            -P "$P" \
            scripts/deploy/remote-deploy.sh \
            "${VPS_USER}@${VPS_HOST}:/tmp/autodetaailing-remote-deploy.sh"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            -p "$P" \
            "${VPS_USER}@${VPS_HOST}" \
            "chmod +x /tmp/autodetaailing-remote-deploy.sh && DEPLOY_PATH=\"${VPS_DEPLOY_PATH}\" GITHUB_SHA=\"${GITHUB_SHA}\" DEPLOY_RELEASE_TGZ=\"${RELEASE_REMOTE}\" bash /tmp/autodetaailing-remote-deploy.sh"

      - name: Smoke test (API health)
        run: |
          set -euo pipefail
          P="${VPS_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            -p "$P" \
            "${VPS_USER}@${VPS_HOST}" \
            "curl -fsS --max-time 15 http://127.0.0.1:5000/health"
